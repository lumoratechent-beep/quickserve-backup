<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <title>You're offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f8fafc;
        color: #111827;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 420px;
      }

      h1 {
        font-size: 28px;
        line-height: 1.1;
        margin: 0 0 10px;
      }

      p {
        color: #4b5563;
        font-size: 15px;
        line-height: 1.5;
        margin: 0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f9fafb;
        }

        p {
          color: #d1d5db;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Please reconnect to the internet, then refresh QuickServe again.</p>
    </main>
  </body>
</html>
