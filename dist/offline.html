<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <title>You're offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #1f1f1f;
        color: #d6d6d6;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        align-items: center;
        display: flex;
        flex-direction: column;
        margin-top: -38px;
        text-align: center;
        width: min(100%, 520px);
      }

      .brand {
        height: 132px;
        margin-bottom: 54px;
        object-fit: contain;
        width: 132px;
      }

      .status {
        align-items: center;
        display: flex;
        gap: 18px;
        justify-content: center;
        margin-bottom: 18px;
      }

      .offline-icon {
        color: #d6d6d6;
        flex: 0 0 auto;
        height: 32px;
        width: 32px;
      }

      h1 {
        font-size: clamp(30px, 2.8vw, 40px);
        font-weight: 400;
        line-height: 1.1;
        margin: 0;
      }

      p {
        color: #a9a9a9;
        font-size: clamp(15px, 1.35vw, 18px);
        line-height: 1.5;
        margin: 0;
        max-width: 440px;
      }

      @media (max-width: 520px) {
        main {
          margin-top: -24px;
        }

        .brand {
          height: 104px;
          margin-bottom: 42px;
          width: 104px;
        }

        .status {
          gap: 12px;
        }

        .offline-icon {
          height: 28px;
          width: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img class="brand" src="/LOGO/icon-192x192.png" alt="QuickServe" />
      <div class="status" aria-label="Offline status">
        <svg class="offline-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="m2 2 20 20M10 5.5A5.5 5.5 0 0 1 20.4 8.7 4.5 4.5 0 0 1 19.5 17H17M7 17H6a4 4 0 0 1-.7-7.94"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.9"
          />
        </svg>
        <h1>You're offline</h1>
      </div>
      <p>please reconnect to the internet, then refresh Quickserve again</p>
    </main>
  </body>
</html>
